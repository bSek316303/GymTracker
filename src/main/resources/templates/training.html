<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gym Progress Tracker - Trening', ~{::.page-resources})}">
    <link class="page-resources" rel="stylesheet" th:href="@{/css/stoper.css}">
    <link class="page-resources" rel="stylesheet" th:href="@{/css/list.css}">
    <link class="page-resources" rel="stylesheet" th:href="@{/css/training.css}">
    <script class="page-resources" th:src="@{/js/stoper.js}" defer></script>
    <script class="page-resources" th:src="@{/js/dropdown.js}" defer></script>
</head>
<body>

<header th:replace="~{fragments/header}"></header>

<main>
    <div class="main-content">

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="stopwatch-container">
            <div class="stopwatch-display" id="stopwatch-display">00:00.00</div>
            <div class="stopwatch-buttons">
                <button id="start-button" class="stopwatch-btn start">Start</button>
                <button id="pause-button" class="stopwatch-btn pause" disabled>Pauza</button>
                <button id="reset-button" class="stopwatch-btn reset" disabled>Reset</button>
            </div>
        </div>

        <form th:action="@{/training/{week}/{day}/{ex}(week=${weekNumber}, day=${dayNumber}, ex=${currentExerciseNumber + 1})}"
              th:method="post" th:object="${currentExerciseDto}" class="exercise-container">

            <input type="hidden" th:field="*{training.Id}" />

            <div class="custom-dropdown">
                <div class="dropdown-trigger" id="dropdownTrigger">
        <span class="dropdown-title">
            <th:block th:each="planEx : ${planExerciseList}" th:if="${planEx.exerciseNumber == currentExerciseNumber}">
                <span th:text="${planEx.exerciseName}">Wybierz ćwiczenie z listy</span>
            </th:block>
        </span>
                    <span class="arrow-indicator"></span>
                </div>

                <div class="dropdown-panel" id="dropdownPanel">
                    <div class="exercise-grid">
                        <button th:each="planEx : ${planExerciseList}"
                                type="button"
                                th:data-target-url="@{/training/{week}/{day}/{exNum}(week=${weekNumber}, day=${dayNumber}, exNum=${planEx.exerciseNumber})}"
                                class="exercise-tile dropdown-submit-btn"
                                th:classappend="${planEx.exerciseNumber == currentExerciseNumber} ? 'active' : ''"
                                style="background: none; border: none; width: 100%; text-align: left; cursor: pointer;">
                            <span class="tile-name" th:text="${planEx.exerciseName}">Nazwa ćwiczenia</span>
                        </button>
                    </div>
                </div>
                <input type="hidden" id="selected-exercise" name="exerciseName" th:value="${currentExerciseNumber}">
            </div>

            <h2 class="exercise-name">
                <th:block th:each="planEx : ${planExerciseList}" th:if="${planEx.exerciseNumber == currentExerciseNumber}">
                    <span th:text="${planEx.exerciseName}">Nazwa bieżącego ćwiczenia</span>
                </th:block>
            </h2>

            <div class="exercise-guidelines">
                <th:block th:each="planEx: ${planExerciseList}" th:if="${planEx.guidelines != null && !planEx.guidelines.isEmpty() && planEx.exerciseNumber == currentExerciseNumber}">
                    <i class="bi bi-sticky"></i>
                    <p th:text="${planEx.guidelines}">Tutaj pojawią się wytyczne do ćwiczenia...</p>
                </th:block>
            </div>

            <div class="parameters-wrapper">
                <div th:each="setLog, stat : *{setLogs}" class="set-card">
                    <h3 class="set-title">Seria <span th:text="${stat.count}">1</span></h3>
                    <table class="set-table">
                        <thead>
                        <tr>
                            <th><strong th:text="${parameter}">Powtórzenia</strong></th>
                            <th><strong>Ciężar (kg)</strong></th>
                            <th><strong>Zapas (RIR)</strong></th>
                            <th><strong>Przerwa (s)</strong></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tbody>
                        <tr>
                            <td>
                                <input type="hidden"
                                       th:name="|setLogs[${stat.index}].setNumber|"
                                       th:value="${stat.count}">

                                <input type="number" min="0" required
                                       th:name="|setLogs[${stat.index}].parameter|"
                                       th:value="${setLog.parameter}">
                            </td>
                            <td>
                                <input type="number" min="0" required
                                       th:name="|setLogs[${stat.index}].weight|"
                                       th:value="${setLog.weight}">
                            </td>
                            <td>
                                <input type="number" min="0"
                                       th:name="|setLogs[${stat.index}].rir|"
                                       th:value="${setLog.rir}">
                            </td>
                            <td>
                                <input type="number" min="0"
                                       th:name="|setLogs[${stat.index}].restTime|"
                                       th:value="${setLog.restTime}">
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:if="${historyExerciseResult != null}" class="history-wrapper">
                <h3 class="history-title">Parametry z poprzedniego tygodnia</h3>

                <div th:each="setLog, stat : ${historySetLogs}" class="set-card history-card">
                    <h4 class="set-title">Seria <span th:text="${stat.count}">1</span></h4>
                    <table class="set-table">
                        <thead>
                        <tr>
                            <th><strong th:text="${parameter}">Powtórzenia</strong></th>
                            <th><strong>Ciężar (kg)</strong></th>
                            <th><strong>Zapas (RIR)</strong></th>
                            <th><strong>Przerwa (s)</strong></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>
                                <input type="number" th:value="${setLog.parameter}" readonly>
                            </td>
                            <td>
                                <input type="number" th:value="${setLog.weight}" readonly>
                            </td>
                            <td>
                                <input type="number" th:value="${setLog.rir}" readonly>
                            </td>
                            <td>
                                <input type="number" th:value="${setLog.restTime}" readonly>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="actions-wrapper">
                <button th:if="${isLastExercise}" type="submit" class="button btn-success">Zakończ trening</button>
                <button th:unless="${isLastExercise}" type="submit" class="button btn-primary">Kolejne ćwiczenie</button>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{fragments/footer}"></footer>

</body>
</html>
